name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter affect-kit typecheck
      - run: pnpm --filter affect-kit build
      - run: pnpm --filter affect-kit test

      - name: Validate package (publint + attw)
        working-directory: packages/affect-kit
        run: |
          npx --no -- publint
          npx --no -- attw --pack . --profile esm-only
